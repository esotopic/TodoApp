<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f5f5f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Todo">
    <title>Todo</title>
    <style>
        /* ============================================================================
           COLOR VARIABLES - matching RubberJoints design system
           ============================================================================ */
        :root {
            --bg: #f5f5f7;
            --s1: #ffffff;
            --s2: #f0f0f3;
            --s3: #e5e5ea;
            --brd: #d1d1d6;
            --tx: #1c1c1e;
            --tx2: #636366;
            --tx3: #8e8e93;
            --acc: #4a6cf7;
            --grn: #34c759;
            --org: #ff9500;
            --red: #ff3b30;
            --pur: #af52de;
            --yel: #ffcc00;
        }

        /* ============================================================================
           RESET + BASE
           ============================================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }
        body {
            background-color: var(--bg);
            color: var(--tx);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-size: 15px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--s3); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--brd); }

        /* ============================================================================
           APP SHELL
           ============================================================================ */
        .page-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg);
            padding-bottom: calc(64px + env(safe-area-inset-bottom));
        }

        /* ============================================================================
           TOP BAR
           ============================================================================ */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px 0;
        }
        .top-bar .user { color: var(--tx2); font-size: 0.8rem; }
        .top-bar .signout { color: var(--tx2); font-size: 0.8rem; text-decoration: none; }

        /* ============================================================================
           PAGE TITLE
           ============================================================================ */
        .page-title {
            text-align: center;
            padding: 24px 16px 16px;
            font-size: 28px;
            font-weight: 700;
            color: var(--tx);
            letter-spacing: -0.02em;
        }

        /* ============================================================================
           CONTENT AREA
           ============================================================================ */
        .content {
            padding: 0 16px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--tx3);
        }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
        .empty-state .msg { font-size: 15px; font-weight: 500; }
        .empty-state .sub { font-size: 13px; margin-top: 4px; color: var(--tx3); }

        /* ============================================================================
           BOTTOM NAVIGATION - matching RubberJoints exactly
           ============================================================================ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            padding-bottom: env(safe-area-inset-bottom);
            background-color: var(--s1);
            border-top: 1px solid var(--brd);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            max-width: 480px;
            margin: 0 auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 8px 12px;
            background: none;
            border: none;
            color: var(--tx3);
            cursor: pointer;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: color 150ms ease;
            text-decoration: none;
        }

        .nav-item.active { color: var(--acc); }
        .nav-item .nav-icon { width: 24px; height: 24px; }
    </style>
</head>
<body>
    <main class="page-container">
        <div class="top-bar">
            <span class="user" id="username"></span>
            <a href="/logout" class="signout">Sign out</a>
        </div>

        <div class="page-title">TODO</div>

        <div class="content">
            <div class="empty-state">
                <div class="icon">✅</div>
                <div class="msg">Your task list is empty</div>
                <div class="sub">Tasks will appear here</div>
            </div>
        </div>
    </main>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 11l3 3L22 4"></path>
                <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
            </svg>
            <span class="nav-label">Tasks</span>
        </a>
        <a href="#" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2L9 7l-5 1 3.5 3.5L7 17l5-2.5L17 17l-.5-5.5L20 8l-5-1z"></path>
                <circle cx="12" cy="9" r="1" fill="currentColor" stroke="none"></circle>
            </svg>
            <span class="nav-label">AI</span>
        </a>
        <a href="#" class="nav-item">
            <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M12 1v6m0 6v6"></path>
                <path d="M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24"></path>
                <path d="M1 12h6m6 0h6"></path>
                <path d="M4.22 19.78l4.24-4.24m5.08-5.08l4.24-4.24"></path>
            </svg>
            <span class="nav-label">Settings</span>
        </a>
    </nav>
    <script>
        fetch('/api/me').then(r => r.json()).then(d => {
            document.getElementById('username').textContent = d.username;
        }).catch(() => { window.location.href = '/login'; });
    </script>
</body>
</html>
