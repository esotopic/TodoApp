<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#f5f5f7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Todo - Login</title>
    <style>
        :root {
            --bg: #f5f5f7; --s1: #ffffff; --s2: #f0f0f3; --s3: #e5e5ea;
            --brd: #d1d1d6; --tx: #1c1c1e; --tx2: #636366; --tx3: #8e8e93;
            --acc: #4a6cf7; --red: #ff3b30;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; width: 100%; }
        body {
            background-color: var(--bg); color: var(--tx);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            font-size: 15px; line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            display: flex; align-items: center; justify-content: center;
        }
        .login-container {
            width: 100%; max-width: 380px; padding: 0 24px;
        }
        .login-title {
            text-align: center; font-size: 32px; font-weight: 700;
            color: var(--tx); letter-spacing: -0.02em; margin-bottom: 8px;
        }
        .login-subtitle {
            text-align: center; font-size: 14px; color: var(--tx3); margin-bottom: 32px;
        }
        .login-card {
            background: var(--s1); border-radius: 16px;
            padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block; font-size: 13px; font-weight: 600;
            color: var(--tx2); margin-bottom: 6px; text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .form-input {
            width: 100%; padding: 12px 14px; font-size: 16px;
            border: 2px solid var(--s3); border-radius: 10px;
            background: var(--bg); color: var(--tx);
            outline: none; transition: border-color 0.2s;
            font-family: inherit;
        }
        .form-input:focus { border-color: var(--acc); }
        .login-btn {
            width: 100%; padding: 14px; font-size: 16px; font-weight: 600;
            background: var(--acc); color: #fff; border: none; border-radius: 12px;
            cursor: pointer; transition: opacity 0.2s; margin-top: 8px;
            font-family: inherit;
        }
        .login-btn:hover { opacity: 0.9; }
        .login-btn:disabled { opacity: 0.5; cursor: default; }
        .error-msg {
            text-align: center; color: var(--red); font-size: 13px;
            margin-top: 12px; min-height: 20px;
        }
        .app-badge {
            text-align: center; margin-top: 24px; font-size: 12px; color: var(--tx3);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-title">TODO</div>
        <div class="login-subtitle">1000 Problems</div>
        <div class="login-card">
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" id="username" autocomplete="username" autocapitalize="none" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" autocomplete="current-password" required>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
                <div class="error-msg" id="errorMsg"></div>
            </form>
        </div>
        <div class="app-badge">1000Problems.com</div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            err.textContent = '';

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await resp.json();
                if (data.success) {
                    window.location.href = '/';
                } else {
                    err.textContent = data.error || 'Login failed';
                }
            } catch (ex) {
                err.textContent = 'Connection error. Please try again.';
            }
            btn.disabled = false;
            btn.textContent = 'Sign In';
        });
    </script>
</body>
</html>
